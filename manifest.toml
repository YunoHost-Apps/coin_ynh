#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "coin"
name = "Coin"
description.en = "Member dashboard for non profit isp"
description.fr = "Outil pour un Internet Neutre"

version = "1.9.2~ynh1"

maintainers = ["ljf", "aleks"]

[upstream]
license = "AGPL-3.0-or-later"
website = "https://code.ffdn.org/FFDN/coin"
code = "https://code.ffdn.org/ffdn/coin"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.admin]
    type = "user"
    
    [install.admin_pw]
    ask.en = "Please chose a password for the admin user."
    ask.fr = "Choisissez un mot de passe pour l'administrateur."
    type = "password"
    
    [install.email]
    ask.en = "Choose email were send notification"
    ask.fr = "Choisissez l'email vers lequel envoyer les notifications"
    type = "string"
    example = "admin@example.tld"

    [install.isp_name]
    ask.en = "Enter your ISP name"
    ask.fr = "Indiquez le nom de votre FAI"
    type = "string"
    example = "My ISP"

    [install.isp_site]
    ask.en = "Enter the address of your ISP website"
    ask.fr = "Saisissez l'adresse du site web de votre FAI"
    type = "string"
    example = "https://www.exemple.tld"

[resources]
    [resources.sources.main]
    url = "https://code.ffdn.org/ffdn/coin/-/archive/v1.9.2/coin-v1.9.2.tar.gz"
    sha256 = "b6baed69946d3c0a80c3e44199028a0fdb016ba0bf3ad315b00992a9f091ccfc"
    autoupdate.strategy = "latest_gitlab_release"

    [resources.system_user]
    allow_email = true

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"
    main.allowed = ["visitors", "all_users"]
    admin.url = "/admin"
    main.allowed = ["admins"]

    [resources.apt]
    packages = ["gunicorn",
        "python3", "python3-venv", "python3-dev",
        "libpq-dev", "libsasl2-dev", "libjpeg-dev", "libxml2-dev", "libxslt1-dev", "libpango-1.0-0", "libpangoft2-1.0-0",
        "postgresql", "postgresql-contrib", "postgresql-server-dev-all",
        "libldap2-dev"]

    [resources.database]
    type = "postgresql"
